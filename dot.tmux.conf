# Tmux config file
# tmux source-file ~/.tmux.conf to reload after changes.

# On exit, attach to other tmux session if they exist
set -g detach-on-destroy off 

# Mouse Scroll
set -g mouse on

# Window buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# True colour support (important for Neovim, themes etc.)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",ghostty:RGB"
set -ga terminal-features ",ghostty:hyperlinks"

# Reduce key delay
set -sg escape-time 0

# Message display time
set -g display-panes-time 3000
set -g display-time 2000

# Clipboard sync
set -g set-clipboard on

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind N command-prompt "new-session -s '%%'"

bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Remote server tmux options
# F12 to toggle outer session key handling on/off
bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Split panes in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
# also apply to new windows
bind c new-window -c "#{pane_current_path}"

# Status bar

# Status bar position and refresh
set -g status-position bottom
set -g status-interval 5

# Overall bar colors (dark background)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name with accent color
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: git-friendly info — user, host, date, time
set -g status-right-length 80
set -g status-right "#[fg=#6c7086] %a %d %b #[fg=#cdd6f4,bold]%R #[fg=#89b4fa]#H "

# Inactive windows
setw -g window-status-format " #I #W "
setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"

# Active window — highlighted accent
setw -g window-status-current-format " #I #W "
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"

# Pane border colors
set -g pane-border-style "fg=#313244"
# set -g pane-active-border-style "fg=#89b4fa"
set -g pane-active-border-style "fg=#fab387"

# Message/command prompt styling
set -g message-style "bg=#313244,fg=#cdd6f4"
